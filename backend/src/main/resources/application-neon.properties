# Accept either a fully formed JDBC URL (NEON_DB_JDBC_URL) or a standard
# Postgres URI (NEON_DB_URL) by prefixing it with jdbc:.
spring.datasource.url=${NEON_DB_JDBC_URL:jdbc:${NEON_DB_URL}}
spring.datasource.username=${NEON_DB_USER:}
spring.datasource.password=${NEON_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
